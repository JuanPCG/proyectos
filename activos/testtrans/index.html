<html>
	<head>
		<title>Cargando tu Ricardo Milos...</title>
		<style>
			@keyframes flash {
				0% { background-color: #ff0000; }
				33% { background-color: #00ff00; }
				66% { background-color: #0000ff; }
				100% { background-color: #ff0000; }
			}
			body {
				animation: flash 5s infinite; 
			}
			video {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body onload="contar_tiempo();setInterval(contar_tiempo,1000)">
		<button id="BOTON" onclick='play()'>(HAZ CLICK AQUI PARA AUDIO)</button>
		<video autoplay loop muted>
			<source src="ricardo.webm" type="video/webm">
		</video>

		<audio id="AUDIO" loop>
			<source src="dota.mp3" type="audio/mpeg">
		</audio>


		<script>
			let segundos = parseInt(localStorage.getItem('segs') || 0);
			let minutos  = parseInt(localStorage.getItem('mins') || 0);
			let horas    = parseInt(localStorage.getItem('hors') || 0);

			function contar_tiempo() {
				segundos+=1;

				if (segundos > 60) {
					segundos-=60
					minutos+=1
				}

				if (minutos > 60) {
					minutos-=60
					horas+=1
				}

				localStorage.setItem('segs', segundos);
				localStorage.setItem('mins', minutos);
				localStorage.setItem('hors', horas);


				const hh = String(horas).padStart(2, '0');
				const mm = String(minutos).padStart(2, '0');
				const ss = String(segundos).padStart(2, '0');
				document.title = `Milos [${hh}:${mm}:${ss}]`;
			}
		</script>

		<script>
			const audio = document.getElementById('AUDIO');
			const btn = document.getElementById('BOTON');

			function play() {
				audio.play();
				btn.style.display = 'none'; 
			}
		</script>
	</body>
</html>
